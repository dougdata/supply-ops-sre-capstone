apiVersion: v1
kind: Service
metadata:
  name: {{ include "supply-worker.fullname" . }}
  labels:
    {{- include "supply-worker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "supply-worker.fullname" . }}
  ports:
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
